<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (() => {
        let theme = "light";
        try {
          const saved = window.localStorage.getItem("ghprs.theme");
          if (saved === "dark" || saved === "light") {
            theme = saved;
          } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch {
          if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <title>{% block title %}smol + askama{% endblock %}</title>
    <link rel="stylesheet" href="/assets/reset.css" />
    <link rel="stylesheet" href="/assets/utilities.css" />
    <script src="/assets/vendor/idiomorph.js"></script>
  </head>
  <body>
    <header class="border-b px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between gap-4">
        <p><a href="/prs">Pull Requests</a></p>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <img src="/assets/icons/moon.svg" alt="" aria-hidden="true" />
          <span class="sr-only">Dark mode</span>
        </button>
      </div>
    </header>
    {% block content %}{% endblock %}
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
