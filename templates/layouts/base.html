<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (() => {
        let theme = "light";
        try {
          const saved = window.localStorage.getItem("ghprs.theme");
          if (saved === "dark" || saved === "light") {
            theme = saved;
          } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch {
          if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <style>
      html {
        background: #f4f4f2;
        color-scheme: light;
      }

      html[data-theme="dark"] {
        background: #111211;
        color-scheme: dark;
      }
    </style>
    <title>{% block title %}smol + askama{% endblock %}</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <script src="/assets/vendor/idiomorph.js"></script>
  </head>
  <body>
    <header class="app-frame">
      <div class="app-frame-inner flex items-center justify-between">
        <a href="/prs" class="app-mark">gh-prs</a>
        <cp-theme-toggle></cp-theme-toggle>
      </div>
    </header>
    {% block content %}{% endblock %}
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
