<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        --bg-a: #f4f7ff;
        --bg-b: #eaf6f1;
        --text: #14213d;
        --card: #ffffff;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 20%, var(--bg-a), transparent 45%),
          radial-gradient(circle at 90% 85%, var(--bg-b), transparent 40%),
          #f9fafb;
      }

      .card {
        width: min(90vw, 560px);
        padding: 2rem;
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 18px 60px rgba(20, 33, 61, 0.12);
        text-align: center;
        animation: rise 400ms ease-out both;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        letter-spacing: 0.02em;
      }

      p {
        margin-top: 0.8rem;
        font-size: 1.05rem;
        color: #334155;
      }

      code {
        color: var(--accent);
        font-weight: 600;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>{{ message }}</h1>
      <p>Served by a tiny <code>smol</code>-based framework + <code>askama</code>.</p>
    </main>
  </body>
</html>
